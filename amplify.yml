version: 1
backend:
  phases:
    build:
      commands:
        - npm install --legacy-peer-deps --no-package-lock
        - corepack enable pnpm
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - node --version
        - npm install --legacy-peer-deps --no-package-lock
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
