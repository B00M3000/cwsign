version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version
        - corepack enable pnpm
        - pnpm --version
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .svelte-kit/**/*
